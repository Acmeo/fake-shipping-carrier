name: ci

# CI on every push to main and every PR; image build only on a published
# GitHub Release (which carries the semver git tag we use for image
# tagging). workflow_dispatch is here for manual reruns from the Actions
# tab while we are still iterating.
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

# The image job pushes to GHCR. The default GITHUB_TOKEN already has the
# right scope when we declare packages:write here -- no PAT needed.
permissions:
  contents: read
  packages: write

env:
  UV_VERSION: "0.8.22"
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history + tags so hatch-vcs can derive the project version
        # from VCS during `uv sync` (which builds the local project).
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies (incl. dev)
        run: uv sync

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src tests

      - name: pytest
        run: uv run pytest

  image:
    # Only on a published release. Tests must pass first.
    name: Build and publish container image
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>:<tag>
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          # Semver tags derived from the git tag attached to the release.
          # `latest` is added automatically by metadata-action for the
          # highest semver tag (flavor=latest=auto).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Derive VERSION from release tag
        # Strip the leading `v` from the release tag so the wheel built
        # inside the image is stamped with the same semver number as the
        # image tag (single source of truth: the git tag). The Dockerfile
        # forwards this as SETUPTOOLS_SCM_PRETEND_VERSION, which
        # hatch-vcs honors when no .git is present.
        id: ver
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
